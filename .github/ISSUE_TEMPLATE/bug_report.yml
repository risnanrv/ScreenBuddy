name: Bug Report
description: Report a defect or unexpected behaviour in ScreenBuddy
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Thank you for reporting a bug. Please complete all fields."

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, one-paragraph description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ScreenBuddy
        2. Set work duration to 1 minute
        3. Wait for break overlay
        4. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ScreenBuddy version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Windows version
      options:
        - Windows 10 (21H2 or earlier)
        - Windows 10 (22H2)
        - Windows 11 (22H2)
        - Windows 11 (23H2 or later)
    validations:
      required: true

  - type: input
    id: monitors
    attributes:
      label: Number of monitors
      placeholder: "e.g. 2 (mixed DPI: 1080p + 4K)"

  - type: textarea
    id: logs
    attributes:
      label: Relevant log entries
      description: >
        Find logs at %APPDATA%\ScreenBuddy\screenbuddy.log.
        Paste only the relevant lines — do not paste PII.
      render: text
