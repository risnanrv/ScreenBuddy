name: Feature Request
description: Suggest a new capability for ScreenBuddy
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: >
        Before submitting, please confirm this feature is not in the
        Out of Scope list (Phase 1 §2.2) and does not contradict the
        product philosophy (Phase 0).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: >
        Describe the user need this addresses. Avoid describing the
        solution yet.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Important — affects my daily use
        - Critical — blocking my use of ScreenBuddy
    validations:
      required: true
