name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Setup Inno Setup
        uses: Disorganizers/Build-InnoSetup@v2

      - name: Restore Dependencies
        run: dotnet restore ScreenBuddy.sln

      - name: Run Tests
        run: dotnet test ScreenBuddy.sln --configuration Release

      - name: Publish Executable
        run: |
          dotnet publish src/ScreenBuddy/ScreenBuddy.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishTrimmed=true -o ./publish

      - name: Compile Installer
        run: |
          iscc installer/setup.iss

      - name: Generate SHA-256 Checksums
        shell: powershell
        run: |
          $hash = (Get-FileHash publish/installer/ScreenBuddy-Setup-1.0.0.exe -Algorithm SHA256).Hash
          "$hash  ScreenBuddy-Setup-1.0.0.exe" | Out-File -FilePath publish/installer/ScreenBuddy-Setup-1.0.0.exe.sha256 -Encoding ascii

      - name: Create Draft GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            publish/installer/ScreenBuddy-Setup-1.0.0.exe
            publish/installer/ScreenBuddy-Setup-1.0.0.exe.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
